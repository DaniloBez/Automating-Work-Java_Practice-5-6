name: CI/CD.yml
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Checks and Tests
        run: ./gradlew check

      - name: Upload Test and Checkstyle Reports
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: error-reports
          path: |
            build/reports/tests/
            build/reports/checkstyle/
          retention-days: 1

  package-jar:
      name: Package JAR
      needs: check-and-test
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Set up JDK 25
          uses: actions/setup-java@v5
          with:
            java-version: '25'
            distribution: 'temurin'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v4

        - name: Make gradlew executable
          run: chmod +x gradlew

        - name: Build JAR artifact
          run: ./gradlew assemble

        - name: Archive JAR file
          uses: actions/upload-artifact@v4
          with:
            name: my-artifact
            path: build/libs/*.jar
            retention-days: 7